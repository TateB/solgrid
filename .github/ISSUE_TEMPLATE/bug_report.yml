name: Bug Report
description: Report a bug in solgrid
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Steps to reproduce the behavior, ideally with a minimal Solidity snippet.
      placeholder: |
        1. Create a file with `pragma solidity ^0.8.0; ...`
        2. Run `solgrid check`
        3. See unexpected output
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Version
      description: Output of `solgrid --version`.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
