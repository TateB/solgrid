name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  doc-test:
    name: Doc Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.74
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  vscode-extension:
    name: VSCode Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: editors/vscode/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run compile
      - run: pnpm test

  vscode-integration-tests:
    name: VSCode Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build solgrid binary
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p solgrid
      # Setup Node.js + pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: editors/vscode/pnpm-lock.yaml
      # Run LSP protocol integration tests
      - run: pnpm install --frozen-lockfile
        working-directory: editors/vscode
      - run: pnpm test:integration
        working-directory: editors/vscode
        env:
          SOLGRID_BIN: ${{ github.workspace }}/target/release/solgrid

  vscode-e2e-tests:
    name: VSCode E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build solgrid binary
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p solgrid
      # Setup Node.js + pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: editors/vscode/pnpm-lock.yaml
      # Build and run e2e tests
      - run: pnpm install --frozen-lockfile
        working-directory: editors/vscode
      - run: pnpm run compile:tests
        working-directory: editors/vscode
      - run: xvfb-run -a node out/test/e2e/run.js
        working-directory: editors/vscode
        env:
          SOLGRID_BIN: ${{ github.workspace }}/target/release/solgrid

  prettier-plugin:
    name: Prettier Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build the NAPI native addon
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Setup Node.js + pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install
        working-directory: packages/prettier-plugin-solgrid
      # Build native addon
      - run: pnpm run build:napi
        working-directory: packages/prettier-plugin-solgrid
      # Run tests
      - run: pnpm test
        working-directory: packages/prettier-plugin-solgrid

  version-check:
    name: Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify versions are in sync
        run: bash scripts/version.sh
