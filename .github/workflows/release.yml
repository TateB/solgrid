name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BINARY_NAME: solgrid

jobs:
  validate-version:
    name: Validate tag version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -A5 '^\[workspace\.package\]' Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)" >&2
            exit 1
          fi
      - name: Verify all package versions are in sync
        run: bash scripts/version.sh

  build:
    name: Build ${{ matrix.vscode-target }}
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - vscode-target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary-ext: ""
            npm-pkg: solgrid/npm/cli-linux-x64
            npm-pkg-name: cli-linux-x64
            npm-binary: solgrid
            napi-pkg: prettier-plugin-solgrid/npm/napi-linux-x64
            napi-pkg-name: napi-linux-x64
          - vscode-target: darwin-x64
            rust-target: x86_64-apple-darwin
            os: macos-13
            binary-ext: ""
            npm-pkg: solgrid/npm/cli-darwin-x64
            npm-pkg-name: cli-darwin-x64
            npm-binary: solgrid
            napi-pkg: prettier-plugin-solgrid/npm/napi-darwin-x64
            napi-pkg-name: napi-darwin-x64
          - vscode-target: darwin-arm64
            rust-target: aarch64-apple-darwin
            os: macos-14
            binary-ext: ""
            npm-pkg: solgrid/npm/cli-darwin-arm64
            npm-pkg-name: cli-darwin-arm64
            npm-binary: solgrid
            napi-pkg: prettier-plugin-solgrid/npm/napi-darwin-arm64
            napi-pkg-name: napi-darwin-arm64
          - vscode-target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            os: windows-latest
            binary-ext: ".exe"
            npm-pkg: solgrid/npm/cli-win32-x64
            npm-pkg-name: cli-win32-x64
            npm-binary: solgrid.exe
            napi-pkg: prettier-plugin-solgrid/npm/napi-win32-x64
            napi-pkg-name: napi-win32-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.93
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2

      # Build the Rust binary
      - name: Build binary
        run: cargo build --release --target ${{ matrix.rust-target }} -p ${{ env.BINARY_NAME }}

      # Stage standalone binary
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.rust-target }}/release/${{ env.BINARY_NAME }}.exe" \
               "staging/${{ env.BINARY_NAME }}-${{ matrix.vscode-target }}${{ matrix.binary-ext }}"
          else
            cp "target/${{ matrix.rust-target }}/release/${{ env.BINARY_NAME }}" \
               "staging/${{ env.BINARY_NAME }}-${{ matrix.vscode-target }}"
            chmod +x "staging/${{ env.BINARY_NAME }}-${{ matrix.vscode-target }}"
          fi

      # Stage binary into extension for VSIX packaging
      - name: Stage extension binary
        shell: bash
        run: |
          mkdir -p editors/vscode/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.rust-target }}/release/${{ env.BINARY_NAME }}.exe" editors/vscode/bin/
          else
            cp "target/${{ matrix.rust-target }}/release/${{ env.BINARY_NAME }}" editors/vscode/bin/
            chmod +x "editors/vscode/bin/${{ env.BINARY_NAME }}"
          fi

      # Build and package VSCode extension
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter solgrid-vscode run compile
      - name: Package VSIX
        working-directory: editors/vscode
        run: npx @vscode/vsce package --no-dependencies --target ${{ matrix.vscode-target }}

      # Upload standalone binary
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.vscode-target }}
          path: staging/${{ env.BINARY_NAME }}-*

      # Upload VSIX
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode-target }}
          path: editors/vscode/*.vsix

      # Stage binary into npm platform package
      - name: Stage npm platform binary
        shell: bash
        run: |
          cp "target/${{ matrix.rust-target }}/release/${{ env.BINARY_NAME }}${{ matrix.binary-ext }}" \
             "packages/${{ matrix.npm-pkg }}/${{ matrix.npm-binary }}"
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x "packages/${{ matrix.npm-pkg }}/${{ matrix.npm-binary }}"
          fi

      # Upload npm platform package
      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm-pkg-name }}
          path: packages/${{ matrix.npm-pkg }}/

      # Build NAPI native addon for prettier-plugin-solgrid
      - name: Build NAPI addon
        shell: bash
        run: npx napi build --release --cargo-cwd crates/solgrid_napi --target ${{ matrix.rust-target }}

      - name: Stage NAPI addon into platform package
        shell: bash
        run: cp solgrid_napi.node "packages/${{ matrix.napi-pkg }}/solgrid_napi.node"

      # Upload napi platform package
      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.napi-pkg-name }}
          path: packages/${{ matrix.napi-pkg }}/

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{binary-*,vsix-*}"
          merge-multiple: true
          path: release/

      # Generate checksums
      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum solgrid-* > checksums-sha256.txt
          cat checksums-sha256.txt

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/solgrid-*
            release/checksums-sha256.txt
            release/*.vsix
          generate_release_notes: true

      # Publish to VS Code Marketplace (requires VSCE_PAT secret)
      - name: Publish to VS Marketplace
        if: env.VSCE_PAT != ''
        run: npx @vscode/vsce publish --packagePath release/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Publish to Open VSX (requires OVSX_PAT secret)
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: |
          for vsix in release/*.vsix; do
            npx ovsx publish "$vsix" -p "$OVSX_PAT"
          done
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  npm-publish:
    name: Publish Prettier Plugin to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Download all napi platform package artifacts
      - name: Download napi platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: "npm-napi-*"
          path: artifacts/napi/

      # Restore artifact directory structure (download-artifact nests under artifact name)
      - name: Flatten artifact directories
        run: |
          for dir in artifacts/napi/npm-napi-*; do
            pkg_name="${dir#artifacts/napi/npm-}"
            if [ -d "packages/prettier-plugin-solgrid/npm/$pkg_name" ] && [ -d "$dir" ]; then
              cp "$dir"/* "packages/prettier-plugin-solgrid/npm/$pkg_name/"
              rm -rf "$dir"
            fi
          done

      # Publish napi platform packages first (must exist before the main package)
      - name: Publish napi platform packages
        run: |
          for pkg in napi-darwin-arm64 napi-darwin-x64 napi-linux-x64 napi-win32-x64; do
            echo "Publishing @solgrid/$pkg..."
            pnpm --filter "@solgrid/$pkg" publish --access public --no-git-checks
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish prettier-plugin-solgrid
      - name: Publish prettier-plugin-solgrid
        run: pnpm --filter prettier-plugin-solgrid publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-publish-cli:
    name: Publish CLI to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Download all platform package artifacts
      - name: Download npm platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: "npm-cli-*"
          path: artifacts/cli/

      # Restore artifact directory structure (download-artifact nests under artifact name)
      - name: Flatten artifact directories
        run: |
          for dir in artifacts/cli/npm-cli-*; do
            pkg_name="${dir#artifacts/cli/npm-}"
            if [ -d "packages/solgrid/npm/$pkg_name" ] && [ -d "$dir" ]; then
              cp "$dir"/* "packages/solgrid/npm/$pkg_name/"
              rm -rf "$dir"
            fi
          done

      # Publish platform packages first (must exist before the main package)
      - name: Publish platform packages
        run: |
          for pkg in cli-darwin-arm64 cli-darwin-x64 cli-linux-x64 cli-win32-x64; do
            echo "Publishing @solgrid/$pkg..."
            pnpm --filter "@solgrid/$pkg" publish --access public --no-git-checks
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish main solgrid package
      - name: Publish solgrid
        run: pnpm --filter solgrid publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
